name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Infrastructure
        uses: azure/arm-deploy@v2
        id: infra
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            location=${{ env.AZURE_LOCATION }}
            baseName=demo-realtime-gpt
            azureOpenAIResourceId=${{ secrets.AZURE_OPENAI_RESOURCE_ID }}
            azureOpenAIEndpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}
            imageTag=${{ env.IMAGE_TAG }}
          failOnStdErr: false

      - name: Get ACR Login Server
        id: acr
        run: |
          ACR_LOGIN_SERVER=${{ steps.infra.outputs.acrLoginServer }}
          echo "acrLoginServer=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: ACR Login
        run: az acr login --name $(echo ${{ steps.acr.outputs.acrLoginServer }} | cut -d'.' -f1)

      - name: Build & Push SPA Image
        run: |
          docker build -t ${{ steps.acr.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.acr.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }}

      - name: Build & Push API Image
        run: |
          docker build -t ${{ steps.acr.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }} ./services/api
          docker push ${{ steps.acr.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }}

      - name: Update SPA Container App
        run: |
          az containerapp update \
            --name demo-realtime-gpt-spa \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }}

      - name: Update API Container App
        run: |
          az containerapp update \
            --name demo-realtime-gpt-api \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }}

      - name: Output URL
        run: |
          echo "🚀 SPA URL: https://${{ steps.infra.outputs.spaUrl }}"
