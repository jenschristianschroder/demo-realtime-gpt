name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --location "${{ env.AZURE_LOCATION }}" \
            --output none

      - name: Deploy Base Infrastructure
        uses: azure/arm-deploy@v2
        id: base
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/base.bicep
          parameters: >-
            location=${{ env.AZURE_LOCATION }}
            baseName=demo-realtime-gpt
          failOnStdErr: false

      - name: ACR Login
        run: |
          ACR_NAME=$(echo "${{ steps.base.outputs.acrLoginServer }}" | cut -d'.' -f1)
          az acr login --name "$ACR_NAME"

      - name: Build & Push SPA Image
        run: |
          docker build -t "${{ steps.base.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }}" .
          docker push "${{ steps.base.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }}"

      - name: Build & Push API Image
        run: |
          docker build -t "${{ steps.base.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }}" ./services/api
          docker push "${{ steps.base.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }}"

      - name: Resolve Azure OpenAI Resource ID
        env:
          AZURE_OPENAI_RESOURCE_ID_SECRET: ${{ secrets.AZURE_OPENAI_RESOURCE_ID }}
          AZURE_OPENAI_ENDPOINT_SECRET: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        run: |
          set -euo pipefail

          trim() {
            # Trim leading/trailing whitespace from a string.
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          RESOURCE_ID_SECRET="$(trim "$AZURE_OPENAI_RESOURCE_ID_SECRET")"
          if [ -n "$RESOURCE_ID_SECRET" ]; then
            echo "AZURE_OPENAI_RESOURCE_ID=$RESOURCE_ID_SECRET" >> "$GITHUB_ENV"
            exit 0
          fi

          ENDPOINT="$(trim "$AZURE_OPENAI_ENDPOINT_SECRET")"
          ENDPOINT="${ENDPOINT%/}"
          if [ -z "$ENDPOINT" ]; then
            echo "::error::AZURE_OPENAI_ENDPOINT must be set."
            exit 1
          fi

          ACCOUNTS_JSON="$(az cognitiveservices account list --query "[].{id:id, endpoint:properties.endpoint}" --output json)"
          RESOURCE_ID=$(ACCOUNTS_JSON="$ACCOUNTS_JSON" python - "$ENDPOINT" <<'PY'
          import json
          import os
          import sys
          from urllib.parse import urlparse
          
          endpoint = sys.argv[1]
          accounts_json = os.environ.get("ACCOUNTS_JSON")
          if not accounts_json:
              print("::error::Azure CLI did not return account data. Verify Azure login and subscription access.", file=sys.stderr)
              raise SystemExit(1)
          try:
              accounts = json.loads(accounts_json)
          except json.JSONDecodeError as exc:
              print(f"::error::Failed to parse Azure CLI output: {exc}", file=sys.stderr)
              raise SystemExit(1)

          if not isinstance(accounts, list):
              print("::error::Unexpected Azure CLI output shape (expected account list).", file=sys.stderr)
              raise SystemExit(1)

          def normalize_endpoint(value: str) -> str:
              value = (value or "").strip()
              if not value:
                  return ""
              if "://" not in value:
                  value = f"https://{value}"
              parsed = urlparse(value)
              host = (parsed.netloc or parsed.path).strip().rstrip("/")
              host = host.split("@")[-1].split(":")[0].lower()
              return f"https://{host}" if host else ""

          expected_endpoint = normalize_endpoint(endpoint)
          if not expected_endpoint:
              print("::error::Invalid AZURE_OPENAI_ENDPOINT value.", file=sys.stderr)
              raise SystemExit(1)

          match = next(
              (
                  account.get('id', '')
                  for account in accounts
                  if normalize_endpoint(account.get('endpoint', '')) == expected_endpoint
              ),
              '',
          )

          if not match:
              expected_name = expected_endpoint[len('https://'):].split('.', 1)[0]
              name_matches = [
                  account.get('id', '')
                  for account in accounts
                  if account.get('id', '').split('/')[-1].lower() == expected_name
              ]
              if len(name_matches) == 1:
                  match = name_matches[0]
          print(match)
          PY
          )

          if [ -z "$RESOURCE_ID" ]; then
            echo "::error::Could not resolve Azure OpenAI resource ID from AZURE_OPENAI_ENDPOINT."
            exit 1
          fi

          echo "AZURE_OPENAI_RESOURCE_ID=$RESOURCE_ID" >> "$GITHUB_ENV"

      - name: Deploy Container Apps
        uses: azure/arm-deploy@v2
        id: apps
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            location=${{ env.AZURE_LOCATION }}
            baseName=demo-realtime-gpt
            azureOpenAIResourceId=${{ env.AZURE_OPENAI_RESOURCE_ID }}
            azureOpenAIEndpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}
            imageTag=${{ env.IMAGE_TAG }}
          failOnStdErr: false

      - name: Output URL
        run: |
          echo "🚀 SPA URL: https://${{ steps.apps.outputs.spaUrl }}"
