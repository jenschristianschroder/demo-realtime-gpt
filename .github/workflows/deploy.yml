name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deployments to avoid race conditions on shared Azure resources.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Preflight Validation
        run: |
          set -euo pipefail
          errors=0
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "::error::AZURE_RESOURCE_GROUP secret is not set."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.AZURE_OPENAI_ENDPOINT }}" ]; then
            echo "::error::AZURE_OPENAI_ENDPOINT secret is not set."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.AZURE_OPENAI_RESOURCE_ID }}" ]; then
            echo "::error::AZURE_OPENAI_RESOURCE_ID secret is not set. Set it to the full resource ID of your Azure OpenAI / AI Services resource."
            errors=$((errors + 1))
          fi
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors required secret(s) are missing. Aborting."
            exit 1
          fi
          echo "✅ Preflight validation passed."

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --location "${{ env.AZURE_LOCATION }}" \
            --output none

      - name: Deploy Infrastructure
        uses: azure/arm-deploy@v2
        id: infra
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            location=${{ env.AZURE_LOCATION }}
            baseName=demo-realtime-gpt
            azureOpenAIEndpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          failOnStdErr: false

      - name: Assign Cognitive Services User Role
        run: |
          az role assignment create \
            --assignee-object-id "${{ steps.infra.outputs.identityPrincipalId }}" \
            --assignee-principal-type ServicePrincipal \
            --role "Cognitive Services User" \
            --scope "${{ secrets.AZURE_OPENAI_RESOURCE_ID }}" \
            --output none
          echo "✅ Cognitive Services User role assigned on Azure OpenAI resource."

      - name: ACR Login
        run: |
          ACR_NAME=$(echo "${{ steps.infra.outputs.acrLoginServer }}" | cut -d'.' -f1)
          az acr login --name "$ACR_NAME"

      - name: Build & Push SPA Image
        run: |
          docker build -t "${{ steps.infra.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }}" .
          docker push "${{ steps.infra.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }}"

      - name: Build & Push API Image
        run: |
          docker build -t "${{ steps.infra.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }}" ./services/api
          docker push "${{ steps.infra.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }}"

      - name: Update SPA Container App
        run: |
          az containerapp update \
            --name demo-realtime-gpt-spa \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.infra.outputs.acrLoginServer }}/demo-realtime-gpt-spa:${{ env.IMAGE_TAG }}

      - name: Update API Container App
        run: |
          az containerapp update \
            --name demo-realtime-gpt-api \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.infra.outputs.acrLoginServer }}/demo-realtime-gpt-api:${{ env.IMAGE_TAG }}

      - name: Smoke Test — API Health Check
        run: |
          SPA_URL="https://${{ steps.infra.outputs.spaUrl }}"
          echo "Checking: ${SPA_URL}/health"
          max_attempts=12
          for i in $(seq 1 $max_attempts); do
            status=$(curl -sf --max-time 10 "${SPA_URL}/health" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/$max_attempts: status=$status, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not return 200 after $max_attempts attempts. The app may still be starting up."

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ env.AZURE_RESOURCE_GROUP }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Location | \`${{ env.AZURE_LOCATION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ACR | \`${{ steps.infra.outputs.acrLoginServer }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🚀 SPA URL | https://${{ steps.infra.outputs.spaUrl }} |" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "🚀 SPA URL: https://${{ steps.infra.outputs.spaUrl }}"
