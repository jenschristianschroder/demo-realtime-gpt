services:
  spa:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build: ./services/api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-realtime-preview}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
